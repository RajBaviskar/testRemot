pipeline:
  stages:
    - name: Stage
      id: stage
      workspace: <+inputs.workspace>
      steps:
        - name: init
          id: init
          iacm:
            uses: rajtgtemp@1.0.4
            with:
              command: init
              connectorRef: account.rajdocker
              image: harnessdev/dev:272
        - name: plan
          id: plan
          iacm:
            uses: rajtgtemp@1.0.4
            with:
              command: plan
              connectorRef: account.rajdocker
              image: harnessdev/dev:272
        - name: apply
          id: apply
          iacm:
            uses: rajtgtemp@1.0.4
            with:
              command: apply
              connectorRef: account.rajdocker
              image: harnessdev/dev:272
  variables:
          - name: DEBUG
            type: String
            description: ""
            required: false
            value: "1"
  inputs:
    workspace:
      type: string
      description: IaCM workspace identifier
